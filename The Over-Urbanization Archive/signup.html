<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign Up | The Over-Urbanization Archive</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/auth.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <nav class="navbar">

        <div class="logo">
            Over-Urbanization Archive
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="archive.html">Archive</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

    </nav>

    <section class="auth-section">

        <div class="auth-card fade-up">

            <div class="auth-left">

                <h1>Create Account</h1>

                <p>
                    Join a growing archive focused on the effects
                    of over-urbanization across the world.
                </p>

                <img
                src="https://images.unsplash.com/photo-1449824913935-59a10b8d2000?q=80&w=1200&auto=format&fit=crop"
                alt="Urban">

            </div>

            <div class="auth-right">

                <h2>Sign Up</h2>

                <form id="signupForm">

                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>

                        <input
                        type="text"
                        id="signupName"
                        placeholder="Full Name"
                        required>
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>

                        <input
                        type="email"
                        id="signupEmail"
                        placeholder="Email"
                        required>
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>

                        <input
                        type="password"
                        id="signupPassword"
                        placeholder="Password"
                        required>
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>

                        <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password"
                        required>
                    </div>

                    <button type="submit" class="auth-btn">
                        Create Account
                    </button>

                    <p class="switch-text">
                        Already have an account?
                        <a href="login.html">Login</a>
                    </p>

                </form>

            </div>

        </div>

    </section>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
